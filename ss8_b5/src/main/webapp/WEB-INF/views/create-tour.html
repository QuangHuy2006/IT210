<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Premium Tour Creation</title>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --error: #ff4d4d;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px; /* Tạo độ sâu cho 3D */
        }

        /* Hiệu ứng nền chuyển động */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(150px);
            border-radius: 50%;
            top: 10%;
            left: 10%;
            z-index: -1;
            animation: move 10s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(100px, 100px); }
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            width: 400px;
            transform: rotateX(10deg) rotateY(-5deg); /* Góc nghiêng 3D */
            transition: transform 0.5s ease;
        }

        .container:hover {
            transform: rotateX(0deg) rotateY(0deg) scale(1.02);
        }

        h2 {
            color: #fff;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px var(--primary);
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #94a3b8;
            margin-bottom: 8px;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
            background: rgba(0, 0, 0, 0.4);
        }

        /* Style cho thông báo lỗi */
        .error-msg {
            color: var(--error);
            font-size: 0.75rem;
            margin-top: 5px;
            font-style: italic;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            color: #fff;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(79, 172, 254, 0.6);
        }

        button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255,255,255,0.2);
            transform: rotate(45deg);
            transition: 0.5s;
        }

        button:hover::after {
            left: 120%;
        }

        /* Custom Date Picker cho đồng bộ 3D */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Create Tour</h2>

    <form th:action="@{/create-tour}" th:object="${tourDTO}" method="post">

        <div class="input-group">
            <label>Tour Code</label>
            <input type="text" th:field="*{tourCode}" placeholder="EX: TOUR-2024" />
            <div class="error-msg" th:if="${#fields.hasErrors('tourCode')}" th:errors="*{tourCode}"></div>
        </div>

        <div style="display: flex; gap: 15px;">
            <div class="input-group">
                <label>Adult Price</label>
                <input type="number" th:field="*{adultPrice}" />
                <div class="error-msg" th:if="${#fields.hasErrors('adultPrice')}" th:errors="*{adultPrice}"></div>
            </div>

            <div class="input-group">
                <label>Child Price</label>
                <input type="number" th:field="*{childPrice}" />
                <div class="error-msg" th:if="${#fields.hasErrors('childPrice')}" th:errors="*{childPrice}"></div>
            </div>
        </div>

        <div class="input-group">
            <label>Start Date</label>
            <input type="date" th:field="*{startDate}" />
            <div class="error-msg" th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}"></div>
        </div>

        <div class="input-group">
            <label>End Date</label>
            <input type="date" th:field="*{endDate}" />
            <div class="error-msg" th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}"></div>
        </div>

        <button type="submit">Deploy Luxury Tour</button>
    </form>
</div>

</body>
</html>
