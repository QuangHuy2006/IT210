<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lịch sử đơn hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>Lịch sử đơn hàng</h2>

<form method="get" class="row mb-3">
    <div class="col-md-3">
        <select name="status" class="form-select">
            <option value="ALL">Tất cả</option>
            <option value="PROCESSING">Đang xử lý</option>
            <option value="DELIVERED">Đã giao</option>
            <option value="CANCELLED">Đã hủy</option>
        </select>
    </div>

    <div class="col-md-3">
        <select name="sortBy" class="form-select">
            <option value="createdDate">Ngày tạo</option>
            <option value="totalAmount">Tổng tiền</option>
        </select>
    </div>

    <div class="col-md-3">
        <select name="direction" class="form-select">
            <option value="desc">Giảm dần</option>
            <option value="asc">Tăng dần</option>
        </select>
    </div>

    <div class="col-md-3">
        <button class="btn btn-primary">Lọc</button>
    </div>
</form>

<table class="table table-bordered">
    <thead>
    <tr>
        <th>ID</th>
        <th>Trạng thái</th>
        <th>Ngày tạo</th>
        <th>Tổng tiền</th>
        <th>Hành động</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="o : ${orders}">
        <td th:text="${o.id}"></td>
        <td th:text="${o.status}"></td>
        <td th:text="${o.createdDate}"></td>
        <td th:text="${o.totalAmount}"></td>
        <td>
            <form th:action="@{'/orders/' + ${o.id} + '/cancel'}" method="post">
                <button class="btn btn-danger btn-sm">Hủy</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<!-- Pagination -->
<nav>
    <ul class="pagination">
        <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
            <a class="page-link"
               th:href="@{/orders(page=${i}, status=${status}, sortBy=${sortBy}, direction=${direction})}"
               th:text="${i + 1}"></a>
        </li>
    </ul>
</nav>

</body>
</html>
